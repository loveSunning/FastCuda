name = "FastCuda"
description = "Codex-managed CUDA kernel development workspace"
primary_language = "cuda-cpp"

[defaults]
instruction_files = [
  ".codex/instructions/project-scope.md",
  ".codex/instructions/cuda-rules.md",
  ".codex/instructions/perf-rules.md",
]
prompt_dir = ".codex/prompts"
skill_dir = ".codex/skills"
agent_dir = ".codex/agents"
hook_dir = ".codex/hooks"

[tools]
env_probe = "scripts/env/probe-env.ps1"
benchmark_runner = "scripts/perf/run-benchmark.ps1"
nsight_compute = "scripts/perf/profile-ncu.ps1"
nsight_systems = "scripts/perf/profile-nsys.ps1"

[artifacts]
env_dir = "artifacts/env"
bench_dir = "artifacts/benchmarks"
profile_dir = "artifacts/profiles"
notes_dir = "artifacts/notes"

[hooks]
pre_benchmark = ".codex/hooks/pre-benchmark.toml"
post_benchmark = ".codex/hooks/post-benchmark.toml"
pre_profile = ".codex/hooks/pre-profile.toml"

